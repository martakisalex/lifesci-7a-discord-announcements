name: One-time Zoom Bot Intro

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, prints payload but does not send"
        required: false
        default: false
        type: boolean

jobs:
  post_intro:
    runs-on: ubuntu-latest
    steps:
      - name: Post intro message to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail

          CONTENT="@everyone hello I'm the zoom bot and will remind everyone and provide the zoom links an hour before each meeting"

          payload=$(python3 - << 'PY'
import json, os
print(json.dumps({
  "content": os.environ["CONTENT"],
  "allowed_mentions": {"parse": ["everyone"]}
}))
PY
          )

          echo "Payload: $payload"

          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            echo "Dry run: not sending."
            exit 0
          fi

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"
