name: One-time Zoom Bot Intro

on:
  workflow_dispatch:

jobs:
  post_intro:
    runs-on: ubuntu-latest
    steps:
      - name: Post intro message to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          DATA="{\"content\":\"@everyone Hi! I’m the Zoom Reminder bot. I’ll post Zoom links in this channel 1 hour before each TA session.\",\"allowed_mentions\":{\"parse\":[\"everyone\"]}}"

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "$DISCORD_WEBHOOK_URL"
