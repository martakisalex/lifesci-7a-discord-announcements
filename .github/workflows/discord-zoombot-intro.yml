name: One-time Zoom Bot Intro

on:
  workflow_dispatch:

jobs:
  post_intro:
    runs-on: ubuntu-latest
    steps:
      - name: Post intro message to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          DATA="{\"content\":\"@everyone hello I'm the zoom bot and will remind everyone and provide the zoom links an hour before each meeting\",\"allowed_mentions\":{\"parse\":[\"everyone\"]}}"

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "$DISCORD_WEBHOOK_URL"
