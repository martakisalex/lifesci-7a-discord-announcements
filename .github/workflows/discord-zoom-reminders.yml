name: Weekly Zoom Reminders (America/Los_Angeles)

on:
  # Runs every 5 minutes (GitHub’s minimum). We “gate” inside the job to only post at the right LA local times.
  schedule:
    - cron: "*/5 * * * *"

  # Manual test button
  workflow_dispatch:
    inputs:
      slot:
        description: "Which reminder to send now?"
        required: true
        type: choice
        options:
          - friday
          - sunday
      dry_run:
        description: "If true, prints payload but does not send"
        required: false
        default: false
        type: boolean

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to post now (LA time)
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          TZ_NAME="America/Los_Angeles"

          # Targets in LA local time:
          # Friday 4:00 PM
          FRI_DOW=5
          FRI_HOUR=16
          FRI_MIN=0

          # Sunday 9:00 AM
          SUN_DOW=7
          SUN_HOUR=9
          SUN_MIN=0

          # If you want “as close to exact as possible”, set WINDOW_MINUTES=1
          # If you want “don’t miss it if GitHub is a few minutes late”, keep 5
          WINDOW_MINUTES=5

          now_dow=$(TZ="$TZ_NAME" date +%u)   # 1=Mon .. 7=Sun
          now_hour=$(TZ="$TZ_NAME" date +%H)  # 00..23
          now_min=$(TZ="$TZ_NAME" date +%M)   # 00..59
          iso_week=$(TZ="$TZ_NAME" date +%G-W%V)

          echo "LA now: $(TZ="$TZ_NAME" date)"
          echo "iso_week=$iso_week" >> "$GITHUB_OUTPUT"

          slot=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            slot="${{ github.event.inputs.slot }}"
          else
            # Convert to base-10 to avoid leading-zero issues
            now_hour_num=$((10#$now_hour))
            now_min_num=$((10#$now_min))

            # Friday window
            if [[ "$now_dow" -eq "$FRI_DOW" && "$now_hour_num" -eq "$FRI_HOUR" ]]; then
              if [[ "$now_min_num" -ge "$FRI_MIN" && "$now_min_num" -lt $((FRI_MIN + WINDOW_MINUTES)) ]]; then
                slot="friday"
              fi
            fi

            # Sunday window
            if [[ -z "$slot" && "$now_dow" -eq "$SUN_DOW" && "$now_hour_num" -eq "$SUN_HOUR" ]]; then
              if [[ "$now_min_num" -ge "$SUN_MIN" && "$now_min_num" -lt $((SUN_MIN + WINDOW_MINUTES)) ]]; then
                slot="sunday"
              fi
            fi
          fi

          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Stop (not time to post)
        if: steps.gate.outputs.slot == ''
        run: echo "Not a posting time."

      # Dedupe: only post once per slot per ISO week
      - name: Restore marker for this slot/week
        if: steps.gate.outputs.slot != '' && github.event_name != 'workflow_dispatch'
        id: cache
        uses: actions/cache@v4
        with:
          path: .state
          key: zoom-reminder-${{ steps.gate.outputs.slot }}-${{ steps.gate.outputs.iso_week }}

      - name: Post reminder to Discord
        if: steps.gate.outputs.slot != '' && (github.event_name == 'workflow_dispatch' || steps.cache.outputs.cache-hit != 'true')
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLOT: ${{ steps.gate.outputs.slot }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$SLOT" == "friday" ]]; then
            CONTENT='@everyone
TA session starts in 1 hour.

Join Zoom Meeting: https://ucla.zoom.us/j/96088387294?pwd=hESyNROfHJTrjrJKFbJKiFzdkap2uZ.1
Meeting ID: 960 8838 7294
Passcode: LS7A'
          elif [[ "$SLOT" == "sunday" ]]; then
            CONTENT='@everyone
TA session starts in 1 hour.

Join Zoom Meeting: https://ucla.zoom.us/j/97578956068?pwd=tnlOHQHlfl4Rc1h2RYQJ3mpctLRGf4.1
Meeting ID: 975 7895 6068
Passcode: LS7A'
          else
            echo "Unknown SLOT: $SLOT"
            exit 1
          fi

          # Build JSON safely (jq is available on ubuntu-latest)
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{
            content: $content,
            allowed_mentions: { parse: ["everyone"] }
          }')

          echo "Payload:"
          echo "$PAYLOAD"

          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            echo "Dry run: not sending."
            exit 0
          fi

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

      - name: Save marker (so it only posts once per slot/week)
        if: steps.gate.outputs.slot != '' && github.event_name != 'workflow_dispatch' && steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .state
          date -u > .state/sent.txt
